<svg width="900" height="700" viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Tým RobotiServis</title>
  <desc id="desc">Stylizovaný tým techniků RobotiServis při diagnostice robotického ramene v moderní servisní hale.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071019"/>
      <stop offset="100%" stop-color="#0f1f2f"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#122638"/>
      <stop offset="100%" stop-color="#0a141f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#18ffff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="700" fill="url(#bg)"/>
  <circle cx="140" cy="80" r="120" fill="#00e5ff" opacity="0.12"/>
  <circle cx="760" cy="620" r="140" fill="#7b2cbf" opacity="0.13"/>

  <rect x="80" y="95" width="740" height="510" rx="26" fill="url(#panel)" stroke="#00e5ff" stroke-opacity="0.35"/>
  <rect x="120" y="145" width="310" height="170" rx="16" fill="#0f1e2d" stroke="#18ffff" stroke-opacity="0.25"/>
  <rect x="470" y="145" width="280" height="170" rx="16" fill="#0f1e2d" stroke="#18ffff" stroke-opacity="0.25"/>

  <g stroke="url(#accent)" stroke-width="6" filter="url(#glow)">
    <line x1="520" y1="560" x2="610" y2="470"/>
    <line x1="610" y1="470" x2="675" y2="430"/>
    <line x1="675" y1="430" x2="735" y2="370"/>
  </g>
  <circle cx="520" cy="560" r="18" fill="#00e5ff"/>
  <circle cx="610" cy="470" r="15" fill="#00e5ff"/>
  <circle cx="675" cy="430" r="13" fill="#00e5ff"/>
  <circle cx="735" cy="370" r="11" fill="#00e5ff"/>

  <g>
    <circle cx="210" cy="390" r="34" fill="#d9ecff"/>
    <rect x="176" y="427" width="68" height="118" rx="18" fill="#1a3550"/>
    <rect x="156" y="447" width="22" height="76" rx="10" fill="#214867"/>
    <rect x="242" y="447" width="22" height="76" rx="10" fill="#214867"/>
    <rect x="183" y="548" width="20" height="52" rx="8" fill="#203447"/>
    <rect x="217" y="548" width="20" height="52" rx="8" fill="#203447"/>
  </g>

  <g>
    <circle cx="330" cy="375" r="32" fill="#d9ecff"/>
    <rect x="298" y="410" width="64" height="132" rx="18" fill="#244560"/>
    <rect x="278" y="430" width="20" height="72" rx="10" fill="#29577a"/>
    <rect x="362" y="430" width="20" height="72" rx="10" fill="#29577a"/>
    <rect x="305" y="545" width="19" height="55" rx="8" fill="#203447"/>
    <rect x="336" y="545" width="19" height="55" rx="8" fill="#203447"/>
  </g>

  <g>
    <rect x="500" y="350" width="220" height="170" rx="24" fill="#0b1824" stroke="#00e5ff" stroke-opacity="0.5"/>
    <rect x="535" y="385" width="150" height="20" rx="8" fill="#1e3b52"/>
    <rect x="535" y="420" width="110" height="20" rx="8" fill="#1e3b52"/>
    <rect x="535" y="455" width="130" height="20" rx="8" fill="#1e3b52"/>
    <circle cx="695" cy="447" r="24" fill="#00e5ff" opacity="0.9"/>
  </g>

  <text x="120" y="130" fill="#18ffff" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">RobotiServis Team</text>
  <text x="122" y="290" fill="#c7e7ff" font-family="Segoe UI, Arial, sans-serif" font-size="20">Diagnostika • Opravy • Preventivní servis</text>
</svg>
